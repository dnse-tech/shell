name : Branch head Prerelease Images

on:
  push:
    branches:
      - main
      - release/v[0-9]+.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Upload artefacts to release.

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  prebuild-env:
    name: Prebuild needed Env vars
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v4
      - name: Set Branch Tag and Other Variables
        id: set-vars
        run: bash ./.github/scripts/branch-tags.sh >> $GITHUB_OUTPUT
    outputs:
      branch_tag: ${{ steps.set-vars.outputs.branch_tag }}
      branch_static_tag: ${{ steps.set-vars.outputs.branch_static_tag }}
      prev_tag: ${{ steps.set-vars.outputs.prev_tag }}

  publish-ghcr:
    permissions:
      contents: read
      packages: write # Required for pushing to GHCR
      id-token: write

    runs-on: ubuntu-latest
    needs:
      - prebuild-env
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build and push all image variations to GHCR
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/s390x
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/shell:${{ needs.prebuild-env.outputs.branch_static_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/shell:${{ needs.prebuild-env.outputs.branch_tag }}
          push: true
